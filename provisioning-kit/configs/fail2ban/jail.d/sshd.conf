# Reference config — what scripts/35-security.sh writes to:
#   /etc/fail2ban/jail.d/provisioning-sshd.conf
#
# Settings: block an IP for 1 hour after 3 failed SSH auth attempts within
# any 10-minute window. Uses systemd backend (journald) since Ubuntu 24.04
# sshd logs to the journal by default.

[sshd]
enabled  = true
port     = ssh
filter   = sshd
backend  = systemd
maxretry = 3
findtime = 600
bantime  = 3600
