# Reference template — what scripts/35-security.sh deploys at first boot.
#
# The script writes the actual file to:
#   /etc/ssh/sshd_config.d/99-provisioning-hardening.conf
#
# ADMIN_USER is replaced with the real admin username (defaults to UID 1000).
# PASSWORD_AUTH is "no" when an authorized_keys file exists for the admin;
# "yes" otherwise (to avoid locking the admin out before a key is in place).
#
# Ubuntu 24.04's default /etc/ssh/sshd_config already contains:
#   Include /etc/ssh/sshd_config.d/*.conf
# so these settings override the base defaults without touching sshd_config.

PermitRootLogin no
PasswordAuthentication PASSWORD_AUTH
MaxAuthTries 3
LoginGraceTime 30
AllowUsers ADMIN_USER
X11Forwarding no
